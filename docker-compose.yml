services:
  miastra:
    build:
      context: .
      dockerfile: Dockerfile
    image: miastra-studio:latest
    container_name: miastra-studio
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NGINX_PORT: 80
      CLIENT_MAX_BODY_SIZE: 25m
      SUB2API_PROXY_TARGET: ${SUB2API_PROXY_TARGET:-http://127.0.0.1:18080}
      PROXY_CONNECT_TIMEOUT: 60s
      PROXY_SEND_TIMEOUT: 600s
      PROXY_READ_TIMEOUT: 600s
      SEND_TIMEOUT: 600s
